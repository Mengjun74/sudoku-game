<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>数独 · Sudoku</title>
    <meta name="description"
        content="A beautiful, interactive Sudoku game with multiple difficulties, notes mode, hints, and a timer." />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- Loading Screen -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Generating puzzle…</div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Victory Overlay -->
    <div class="victory-overlay" id="victory-overlay">
        <div class="victory-card">
            <span class="victory-emoji">🏆</span>
            <h2 class="victory-title">Puzzle Solved!</h2>
            <p class="victory-subtitle">Incredible work. The grid is complete!</p>
            <div class="victory-stats">
                <div class="v-stat">
                    <div class="v-stat-label">Time</div>
                    <div class="v-stat-value" id="v-time">00:00</div>
                </div>

                <div class="v-stat">
                    <div class="v-stat-label">Difficulty</div>
                    <div class="v-stat-value" id="v-difficulty">Medium</div>
                </div>
            </div>
            <div class="victory-actions">
                <button class="btn btn-ghost" id="victory-close-btn">Review</button>
                <button class="btn btn-primary" id="victory-new-btn">🎲 New Game</button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="header-logo">
            <div class="icon">⊞</div>
            <h1>数独</h1>
        </div>
        <div class="header-right">
            <button class="btn btn-ghost" id="restart-btn">↺ Restart</button>
            <button class="btn btn-primary" id="new-game-btn">🎲 New Game</button>
        </div>
    </header>

    <!-- Main -->
    <main class="main">

        <!-- Info Bar -->
        <div class="info-bar">
            <!-- Difficulty Tabs -->
            <div class="difficulty-tabs">
                <button class="diff-tab" data-diff="easy">Easy</button>
                <button class="diff-tab active" data-diff="medium">Medium</button>
                <button class="diff-tab" data-diff="hard">Hard</button>
                <button class="diff-tab" data-diff="expert">Expert</button>
            </div>

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-icon">⏱</span>
                    <div>
                        <div class="stat-label">Time</div>
                        <div class="stat-value" id="timer-value">00:00</div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Board Column -->
        <div class="board-container">
            <!-- Board -->
            <div class="sudoku-board" id="board" aria-label="Sudoku board"></div>


        </div>

        <!-- Side Panel -->
        <aside class="side-panel">

            <!-- Number Pad -->
            <div class="numpad">
                <button class="num-btn" data-num="1">1<span class="rem-badge">9</span></button>
                <button class="num-btn" data-num="2">2<span class="rem-badge">9</span></button>
                <button class="num-btn" data-num="3">3<span class="rem-badge">9</span></button>
                <button class="num-btn" data-num="4">4<span class="rem-badge">9</span></button>
                <button class="num-btn" data-num="5">5<span class="rem-badge">9</span></button>
                <button class="num-btn" data-num="6">6<span class="rem-badge">9</span></button>
                <button class="num-btn" data-num="7">7<span class="rem-badge">9</span></button>
                <button class="num-btn" data-num="8">8<span class="rem-badge">9</span></button>
                <button class="num-btn" data-num="9">9<span class="rem-badge">9</span></button>
                <button class="erase-btn">⌫ Erase</button>
            </div>

            <!-- Side Actions -->
            <div class="side-actions">
                <button class="action-btn" id="notes-btn">
                    <span class="icon">✏️</span>
                    <span class="label">Notes</span>
                </button>
                <button class="action-btn" id="hint-btn">
                    <span class="icon">💡</span>
                    <span class="label">Hint</span>
                </button>

                <button class="action-btn" id="pause-btn">
                    <span class="icon">⏸</span>
                    <span class="label">Pause</span>
                </button>
            </div>

        </aside>

    </main>

    <!-- Scripts -->
    <script src="sudoku.js"></script>
    <script src="app.js"></script>
</body>

</html>
